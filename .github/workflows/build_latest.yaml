name: Build-Satellite-Firmware

on:
  push:
    branches:
      - develop
      - staging
      - main
  pull_request:
    branches:
      - staging
      - main
  workflow_dispatch:

env:
  DEFAULT_PYTHON: "3.9"

jobs:
  resolve-esphome-version:
    name: Resolve ESPHome version
    runs-on: ubuntu-latest
    outputs:
      esphome-version: ${{ steps.resolve.outputs.esphome_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read ESPHome version from requirements.txt
        id: resolve
        run: |
          version=$(grep -E '^esphome==' requirements.txt | cut -d'=' -f3)
          if [ -z "$version" ]; then
            echo "Failed to resolve ESPHome version from requirements.txt"
            exit 1
          fi
          echo "esphome_version=$version" >> "$GITHUB_OUTPUT"

  build-firmware:
    needs:
      - resolve-esphome-version
    uses: ./.github/workflows/build.yaml
    with:
      files: |
        config/satellite1.yaml
        config/satellite1.ld2410.yaml
        config/satellite1.ld2450.yaml
      esphome-version: ${{ needs.resolve-esphome-version.outputs.esphome-version }}
      release-summary: develop-branch
      release-url:
      release-version:


  create_artifact_matrix:
    name: Create artifact matrix
    needs:
      - build-firmware
    outputs:
      matrix: ${{ steps.artifacts.outputs.matrix }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: files

      - run: tree

      - name: Get artifact names
        id: artifacts
        run: |
          artifacts=$(ls --format=single-column files)
          echo "artifacts<<EOF" >> $GITHUB_OUTPUT
          echo "$artifacts" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "matrix=$(ls files | jq -R -s -c 'split("\n")[:-1]')" >> $GITHUB_OUTPUT
