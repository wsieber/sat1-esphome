substitutions:
  company_name: FutureProofHomes
  project_name: Satellite1

  # set this version by GHA at build time
  esp32_fw_version: dev

packages:
  - !include satellite1.base.yaml
  - !include common/microphones.yaml

esphome:
  project:
    name: ${company_name}.${project_name}
    version: ${esp32_fw_version}


external_components:
  - source:
      type: local
      path: ../esphome/components
    components:
      - audio
      - fusb302b
      - i2s_audio
      - improv_serial
      - memory_flasher
      - mixer
      - online_testing
      - pcm5122
      - resampler
      - satellite1
      #- snapcast
      - speaker
      - tas2780

logger:
  deassert_rts_dtr: true
  hardware_uart: USB_SERIAL_JTAG
  level: debug
  logs:
    ltr_als_ps: WARN

globals:
  - id: test_instructions
    type: int
    restore_value: no
    initial_value: '0'


api:
  encryption: !remove

media_player:
  - id: !extend external_media_player
    files:
      - id: audio_test_sweep
        file: ../esphome/components/online_testing/sweep_512.wav


memory_flasher:
  - id: !extend xflash
    on_flashing_success:
      then:
        - improv_serial.send_action_status:
            action: "FLASH_XMOS_EMBEDDED"
            status: 0

    on_flashing_failed:
      then:
        - improv_serial.send_action_status:
            action: "FLASH_XMOS_EMBEDDED"
            status: 1

    on_erasing_done:
      then:
        - improv_serial.send_action_status:
            action: "ERASE_XMOS_FLASH"
            status: 0



online_testing:
  id: mic_tester
  microphone: sat1_mics
  media_file: audio_test_sweep
  on_detected:
    then:
      - logger.log: "Sweep detected"
      - improv_serial.send_action_status:
          action: "SWEEP_DETECTED"
          status: 0


improv_serial:
  on_action:
    then:
      - if:
          condition:
            lambda: return x.get_action() == std::string("RESET_XMOS");
          then:
            - satellite1.xmos_hardware_reset:
      - if:
          condition:
            lambda: return x.get_action() == std::string("ERASE_XMOS_FLASH");
          then:
            - memory_flasher.erase:

      - if:
          condition:
            lambda: return x.get_action() == std::string("FLASH_XMOS_EMBEDDED");
          then:
            - memory_flasher.write_embedded_image:


      - if:
          condition:
            lambda: return x.get_action() == std::string("READ_XMOS_FIRMWARE");
          then:
            - logger.log: "Reading XMOS firmware version via SPI"
            - lambda: id(satellite1_id).read_xmos_firmware();

      - if:
          condition:
            lambda: return x.get_action() == std::string("ENABLE_LED_RING");
          then:
            - logger.log: "Enable full led ring with color: white"
            - light.turn_on:
                id: voice_assistant_leds
                brightness: 33%
                red: 100%
                green: 100%
                blue: 100%
                effect: None

      - if:
          condition:
            lambda: return x.get_action() == std::string("SET_TEST_FAILED_STATE");
          then:
            - logger.log: "Test failed, set leds to red"
            - light.turn_on:
                id: voice_assistant_leds
                brightness: 33%
                red: 100%
                green: 0%
                blue:  0%
                effect: None

      - if:
          condition:
            lambda: return x.get_action() == std::string("SET_WAITING_FOR_LINE_OUT");
          then:
            - logger.log: "We are waiting for the line out to be connected"
            - light.turn_on:
                id: voice_assistant_leds
                brightness: 33%
                red: 100%
                green: 100%
                blue:  100%
                effect: "Jack Unplugged"

      - if:
          condition:
            lambda: return x.get_action() == std::string("DISABLE_LED_RING");
          then:
            - lambda: id(test_instructions) = 0;
            - light.turn_off:
                id: voice_assistant_leds

      - if:
          condition:
            lambda: return x.get_action() == std::string("LOG_CURR_TEMP_HUMIDITY");
          then:
            - logger.log:
                format: "The AHT20 reports temperature %.1f and humidity %.1f"
                args: [ 'id(temperature_sensor).state', 'id(humidity_sensor).state' ]

      - if:
          condition:
            lambda: return x.get_action() == std::string("LOG_CURR_LIGHT_SENSOR");
          then:
            - logger.log:
                format: "The light sensor reports: %.1f"
                args: [ 'id(ambient_light).state' ]

      - if:
          condition:
            lambda: return x.get_action() == std::string("LOG_LINE_OUT_STATE");
          then:
            - logger.log:
                format: "The line out reports: %s"
                args: [ 'id(line_out_sensor).state ? "connected" : "disconnected"' ]


      - if:
          condition:
            lambda: return x.get_action() == std::string("LOG_MUTE_STATE");
          then:
            - logger.log:
                format: "The hardware mute reports: %s"
                args: [ 'id(btn_left).state ? "muted" : "unmuted"' ]

      - if:
          condition:
            lambda: return x.get_action() == std::string("MEASURE_MIC_ENERGY");
          then:
            - lambda: |-
                float energy = id(mic_tester).get_mic_energy();
                ESP_LOGI("mic_energy", "Mic energy (ch=%d): %.6f", id(mic_tester).get_channel(), energy);

      - if:
          condition:
            lambda: return x.get_action() == std::string("PLAY_SWEEP_SOUND");
          then:
            - script.execute:
                id: play_sound
                priority: false
                sound_file: !lambda return id(audio_test_sweep);


      - if:
          condition:
            lambda: return x.get_action() == std::string("SET_TO_LINE_OUT");
          then:
            - logger.log: "Activate line-out DAC"
            - delay: 500ms
            - lambda: |-
                id(dac_proxy).activate_line_out();

      - if:
          condition:
            lambda: return x.get_action() == std::string("SET_TO_BUILT_IN_SPEAKER");
          then:
            - logger.log: "Activate built-in speaker DAC"
            - delay: 500ms
            - lambda: |-
                id(dac_proxy).activate_speaker();

      - if:
          condition:
            lambda: |-
              return x.get_action().substr(0, 11) == std::string("SET_VOLUME_");
          then:
            - lambda: |-
                std::string action = x.get_action();
                int volume_pct = std::stoi(action.substr(11));
                float volume = volume_pct / 100.0f;
                id(external_media_player)->make_call()
                  .set_volume(volume)
                  .perform();
            - logger.log:
                format: "Volume set to %d%%"
                args: ['std::stoi(x.get_action().substr(11))']

      - if:
          condition:
            lambda: return x.get_action() == std::string("ENABLE_SWEEP_DETECTED_LEFT");
          then:
            - logger.log: "Starting audio sweep detection on Left Mic (ch0)"
            - delay: 500ms
            - lambda: |-
                id(mic_tester).set_microphone(id(sat1_mics));
                id(mic_tester).set_channel(0);
                if (!id(mic_tester).is_running()) {
                  id(mic_tester).request_start(true);
                } else {
                  id(mic_tester).reset_detection();
                }

      - if:
          condition:
            lambda: return x.get_action() == std::string("DISABLE_SWEEP_DETECTED_LEFT");
          then:
            - logger.log: "Pausing audio sweep detection on Left Mic"
            - lambda: |-
                id(mic_tester).pause_detection();

      - if:
          condition:
            lambda: return x.get_action() == std::string("ENABLE_SWEEP_DETECTED_RIGHT");
          then:
            - logger.log: "Starting audio sweep detection on Right Mic (ch1)"
            - delay: 500ms
            - lambda: |-
                id(mic_tester).set_channel(1);
                if (!id(mic_tester).is_running()) {
                  id(mic_tester).set_microphone(id(sat1_mics));
                  id(mic_tester).request_start(true);
                } else {
                  id(mic_tester).reset_detection();
                }

      - if:
          condition:
            lambda: return x.get_action() == std::string("DISABLE_SWEEP_DETECTED_RIGHT");
          then:
            - logger.log: "Stopping audio sweep detection on Right Mic"
            - lambda: |-
                if (id(mic_tester).is_running()) {
                  id(mic_tester).request_stop();
                }


      - if:
          condition:
            lambda: return x.get_action() == std::string("LED_INSTRUCTION_UP_BUTTON");
          then:
            - logger.log: "led instructions up button detected"
            - lambda: id(test_instructions) = 1;
            - light.turn_on:
                id: voice_assistant_leds
                brightness: 33%
                red: 100%
                green: 100%
                blue: 100%
                effect: "Test Instructions"

      - if:
          condition:
            lambda: return x.get_action() == std::string("LED_INSTRUCTION_DOWN_BUTTON");
          then:
            - logger.log: "led instructions down button detected"
            - lambda: id(test_instructions) = 3;
            - script.execute: control_leds

      - if:
          condition:
            lambda: return x.get_action() == std::string("LED_INSTRUCTION_LEFT_BUTTON");
          then:
            - logger.log: "led instructions left button detected"
            - lambda: id(test_instructions) = 4;
            - script.execute: control_leds

      - if:
          condition:
            lambda: return x.get_action() == std::string("LED_INSTRUCTION_RIGHT_BUTTON");
          then:
            - logger.log: "led instructions right button detected"
            - lambda: id(test_instructions) = 2;
            - script.execute: control_leds
