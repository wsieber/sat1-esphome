ethernet:
  id: ethernet_id
  type: W5500
  spi_id: spi_0
  cs_pin:
    number: GPIO3
    ignore_strapping_warning: true 

  on_connect:
    # Script disables WiFi and BLE when ethernet has IP (voice_assistant can then use micro_wake_word)
    - lambda: |-
        id(network_setup_completed) = true;
    - script.execute: control_leds
    - script.execute: set_network_connection_str
    - tas2780.activate:
        mode: 2
  on_disconnect:
    - script.execute: set_network_connection_str

script:
  - id: set_network_connection_str
    then:
      - lambda: |-
          auto ips = id(ethernet_id).get_ip_addresses();
          for (auto &ip : ips) {
            auto s = ip.str();
            if (!s.empty() && s != "0.0.0.0") {
              auto speed = id(ethernet_id).get_link_speed() == ETH_SPEED_100M ? "100" : "10";
              auto duplex = id(ethernet_id).get_duplex_mode() == ETH_DUPLEX_FULL ? "Full" : "Half";
              char buf[96];
              snprintf(buf, sizeof(buf), "Eth: %s\n%s Mbps %s Duplex", s.c_str(), speed, duplex);
              id(network_status_str) = std::string(buf);
              return; 
            }
          }
          id(network_status_str) = "Disconnected";
      - text_sensor.template.publish:
          id: network_status_sensor
          state: !lambda 'return id(network_status_str);'