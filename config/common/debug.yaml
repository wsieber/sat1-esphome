# ---------------------------------------------------------------------------
# Mic / LED diagnostic tooling
# ---------------------------------------------------------------------------
globals:
  - id: mic_monitor_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: mic_monitor_channel
    type: int
    restore_value: no
    initial_value: '0'
  - id: mic_stream_active
    type: bool
    restore_value: no
    initial_value: 'false'

switch:
  - platform: template
    name: "Mic Monitor (Line-Out)"
    id: mic_monitor_switch
    icon: "mdi:microphone-message"
    entity_category: diagnostic
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          id(announcement_resampling_speaker).stop();
          audio::AudioStreamInfo info(16, 2, 16000);
          id(announcement_resampling_speaker).set_audio_stream_info(info);
          id(announcement_resampling_speaker).start();
          id(mic_monitor_active) = true;
      - dac_proxy.activate_line_out:
    turn_off_action:
      - lambda: |-
          id(mic_monitor_active) = false;
      - delay: 200ms
      - lambda: |-
          id(announcement_resampling_speaker).stop();

  - platform: template
    name: "Mic Monitor (Network Stream)"
    id: mic_stream_switch
    icon: "mdi:broadcast"
    entity_category: diagnostic
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          id(mic_stream_active) = true;
          ESP_LOGI("debug", "Network mic stream enabled — connect to http://<device-ip>:8081/mic_stream");
    turn_off_action:
      - lambda: |-
          id(mic_stream_active) = false;
          ESP_LOGI("debug", "Network mic stream disabled");

  - platform: template
    name: "Hey Jarvis"
    id: ww_hey_jarvis_switch
    icon: "mdi:account-voice"
    entity_category: config
    restore_mode: DISABLED
    lambda: |-
      return id(hey_jarvis).is_enabled();
    turn_on_action:
      - micro_wake_word.enable_model:
          id: hey_jarvis
      - lambda: ESP_LOGI("debug", "Wake word 'Hey Jarvis' enabled");
    turn_off_action:
      - micro_wake_word.disable_model:
          id: hey_jarvis
      - lambda: ESP_LOGI("debug", "Wake word 'Hey Jarvis' disabled");

  - platform: template
    name: "Okay Nabu"
    id: ww_okay_nabu_switch
    icon: "mdi:account-voice"
    entity_category: config
    restore_mode: DISABLED
    lambda: |-
      return id(okay_nabu).is_enabled();
    turn_on_action:
      - micro_wake_word.enable_model:
          id: okay_nabu
      - lambda: ESP_LOGI("debug", "Wake word 'Okay Nabu' enabled");
    turn_off_action:
      - micro_wake_word.disable_model:
          id: okay_nabu
      - lambda: ESP_LOGI("debug", "Wake word 'Okay Nabu' disabled");

number:
  - platform: template
    name: "Wake Word Mic Gain"
    id: mww_gain_number
    icon: "mdi:microphone-plus"
    entity_category: diagnostic
    min_value: 1
    max_value: 64
    step: 1
    mode: slider
    initial_value: 6
    optimistic: true
    restore_value: true
    on_value:
      - lambda: |-
          id(mww_mic_source).set_gain_factor(static_cast<int32_t>(x));
          ESP_LOGI("mic_monitor", "Wake word mic gain set to %d", (int)x);

select:
  - platform: template
    name: "Mic Monitor Channel"
    id: mic_monitor_channel_select
    icon: "mdi:microphone-settings"
    entity_category: diagnostic
    options:
      - "Ch 0 - Voice Assistant"
      - "Ch 1 - Wake Word"
    initial_option: "Ch 0 - Voice Assistant"
    optimistic: true
    restore_value: false
    on_value:
      - lambda: |-
          if (x == "Ch 1 - Wake Word") {
            id(mic_monitor_channel) = 1;
          } else {
            id(mic_monitor_channel) = 0;
          }

  - platform: template
    name: "LED Animation Test"
    id: led_animation_test
    icon: "mdi:led-on"
    entity_category: diagnostic
    options:
      - "Normal"
      - "Waiting for Command"
      - "Listening for Command"
      - "Thinking"
      - "Replying"
      - "Error"
    initial_option: "Normal"
    optimistic: true
    restore_value: false
    on_value:
      - lambda: |-
          static bool setup_done = false;
          if (x == "Waiting for Command") {
            id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
          } else if (x == "Listening for Command") {
            id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
          } else if (x == "Thinking") {
            id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
          } else if (x == "Replying") {
            id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          } else if (x == "Error") {
            id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          } else {
            id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          }
          if (!setup_done) {
            setup_done = true;
            return;
          }
          id(control_leds).execute();
