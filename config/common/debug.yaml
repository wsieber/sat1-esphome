    hide_timestamp: true

  - platform: template
    name: "MAC Address"
    id: mac_address_text
    icon: "mdi:network-outline"
    entity_category: "diagnostic"
    update_interval: never
    lambda: |-
      return get_mac_address_pretty();

  - platform: template
    name: "Device Name"
    id: device_name_text
    icon: "mdi:tag"
    entity_category: "diagnostic"
    update_interval: never
    internal: true

  - platform: template
    name: "Assist Satellite State"
    id: va_state_text
    icon: "mdi:account-voice"
    entity_category: "diagnostic"
    update_interval: 2s
    lambda: |-
      int phase = id(voice_assistant_phase);
      if (phase == ${voice_assist_not_ready_phase_id}) return std::string("Not Ready");
      if (phase == ${voice_assist_idle_phase_id}) return std::string("Idle");
      if (phase == ${voice_assist_waiting_for_command_phase_id}) return std::string("Waiting for Command");
      if (phase == ${voice_assist_listening_for_command_phase_id}) return std::string("Listening");
      if (phase == ${voice_assist_thinking_phase_id}) return std::string("Thinking");
      if (phase == ${voice_assist_replying_phase_id}) return std::string("Replying");
      if (phase == ${voice_assist_error_phase_id}) return std::string("Error");
      return std::string("Unknown");

