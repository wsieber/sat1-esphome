# =============================================================================
# Universal mmWave radar configuration
# Auto-detects LD2410 or LD2450 at boot; hides irrelevant entities when no
# matching sensor is found.
# =============================================================================

uart:
  id: uart_mmwave
  tx_pin: GPIO43
  rx_pin: GPIO44
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

satellite1_radar:
  id: sat1_radar
  uart_id: uart_mmwave

# ---------------------------------------------------------------------------
# Common binary sensors (visible when any radar is detected)
# ---------------------------------------------------------------------------
binary_sensor:
  - platform: satellite1_radar
    has_target:
      name: Room Presence
    has_moving_target:
      name: Radar Target Moving
    has_still_target:
      name: Radar Target Still

# ---------------------------------------------------------------------------
# Text sensors
# ---------------------------------------------------------------------------
text_sensor:
  - platform: satellite1_radar
    radar_type:
      name: "Radar Detected"
      entity_category: "diagnostic"
    radar_firmware:
      name: "Radar Firmware"
    ld2450_mac:
      name: "LD2450 BT MAC"
    target_1:
      direction:
        name: "Target-1 Direction"
    target_2:
      direction:
        name: "Target-2 Direction"
    target_3:
      direction:
        name: "Target-3 Direction"
    ld2450_zones:
      zone_1:
        name: "Radar Zone 1"
      zone_2:
        name: "Radar Zone 2"
      zone_3:
        name: "Radar Zone 3"

# ---------------------------------------------------------------------------
# Numeric sensors
# ---------------------------------------------------------------------------
sensor:
  - platform: satellite1_radar

    # LD2410 sensors
    ld2410_moving_distance:
      name: Radar Moving Distance
    ld2410_still_distance:
      name: Radar Still Distance
    ld2410_moving_energy:
      name: Radar Moving Energy
      entity_category: "diagnostic"
      disabled_by_default: true
    ld2410_still_energy:
      name: Radar Still Energy
      entity_category: "diagnostic"
      disabled_by_default: true
    ld2410_detection_distance:
      name: Radar Detection Distance
      entity_category: "diagnostic"
      disabled_by_default: true
    ld2410_light:
      name: Radar Illuminance
      entity_category: "diagnostic"
      disabled_by_default: true

    ld2410_gates:
      g0:
        move_energy:
          name: Radar Gate-0 Moving Energy
          entity_category: "diagnostic"
        still_energy:
          name: Radar Gate-0 Still Energy
          entity_category: "diagnostic"
      g1:
        move_energy:
          name: Radar Gate-1 Moving Energy
          entity_category: "diagnostic"
        still_energy:
          name: Radar Gate-1 Still Energy
          entity_category: "diagnostic"
      g2:
        move_energy:
          name: Radar Gate-2 Moving Energy
          entity_category: "diagnostic"
        still_energy:
          name: Radar Gate-2 Still Energy
          entity_category: "diagnostic"
      g3:
        move_energy:
          name: Radar Gate-3 Moving Energy
          entity_category: "diagnostic"
        still_energy:
          name: Radar Gate-3 Still Energy
          entity_category: "diagnostic"
      g4:
        move_energy:
          name: Radar Gate-4 Moving Energy
          entity_category: "diagnostic"
        still_energy:
          name: Radar Gate-4 Still Energy
          entity_category: "diagnostic"
      g5:
        move_energy:
          name: Radar Gate-5 Moving Energy
          entity_category: "diagnostic"
        still_energy:
          name: Radar Gate-5 Still Energy
          entity_category: "diagnostic"
      g6:
        move_energy:
          name: Radar Gate-6 Moving Energy
          entity_category: "diagnostic"
        still_energy:
          name: Radar Gate-6 Still Energy
          entity_category: "diagnostic"
      g7:
        move_energy:
          name: Radar Gate-7 Moving Energy
          entity_category: "diagnostic"
        still_energy:
          name: Radar Gate-7 Still Energy
          entity_category: "diagnostic"
      g8:
        move_energy:
          name: Radar Gate-8 Moving Energy
          entity_category: "diagnostic"
        still_energy:
          name: Radar Gate-8 Still Energy
          entity_category: "diagnostic"

    # LD2450 sensors
    ld2450_target_count:
      name: Radar Targets Total
    ld2450_still_target_count:
      name: Radar Targets Still
    ld2450_moving_target_count:
      name: Radar Targets Moving

    ld2450_targets:
      target_1:
        x:
          name: Target-1 X
        y:
          name: Target-1 Y
        speed:
          name: Target-1 Speed
        angle:
          name: Target-1 Angle
        distance:
          name: Target-1 Distance
        resolution:
          name: Target-1 Resolution
      target_2:
        x:
          name: Target-2 X
        y:
          name: Target-2 Y
        speed:
          name: Target-2 Speed
        angle:
          name: Target-2 Angle
        distance:
          name: Target-2 Distance
        resolution:
          name: Target-2 Resolution
      target_3:
        x:
          name: Target-3 X
        y:
          name: Target-3 Y
        speed:
          name: Target-3 Speed
        angle:
          name: Target-3 Angle
        distance:
          name: Target-3 Distance
        resolution:
